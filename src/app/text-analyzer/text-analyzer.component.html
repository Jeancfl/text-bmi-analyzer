<div class="card p-3 mb-3">

  <h5>Text Analyzer</h5>

  <textarea class="form-control mb-2" [(ngModel)]="inputText"></textarea>

  <button class="btn btn-primary btn-sm mb-2" (click)="analyzeText()">
    Analyze
  </button>

  <p>Vowels: {{vowelCount}}</p>
  <p>Consonants: {{consonantCount}}</p>

</div>
